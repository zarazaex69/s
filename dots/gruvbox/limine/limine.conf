timeout: 5

interface_resolution: 1920x1080
interface_branding: Arch Linux
interface_branding_colour: 3
term_font_scale: 2x2

# gruvbox dark palette
term_background: ff282828
term_foreground: ebdbb2
term_background_bright: 504945
term_foreground_bright: fbf1c7

# black, red, green, brown, blue, magenta, cyan, gray
term_palette: 282828;cc241d;98971a;d79921;458588;b16286;689d6a;a89984
term_palette_bright: 928374;fb4934;b8bb26;fabd2f;83a598;d3869b;8ec07c;ebdbb2

/Arch Linux
    protocol: linux
    path: boot():/vmlinuz-linux
    cmdline: quiet loglevel=3 systemd.show_status=auto rd.udev.log_level=3 vt.global_cursor_default=0 rw
    module_path: boot():/initramfs-linux.img

/Arch Linux (fallback)
    protocol: linux
    path: boot():/vmlinuz-linux
    cmdline: quiet loglevel=3 systemd.show_status=auto rd.udev.log_level=3 vt.global_cursor_default=0 rw
    module_path: boot():/initramfs-linux-fallback.img
