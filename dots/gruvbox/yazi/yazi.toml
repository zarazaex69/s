[mgr]
show_hidden = true

[opener]
edit = [
    { run = 'nvim "$@"', block = true, for = "unix" }
]
play = [
    { run = 'mpv "$@"', orphan = true, for = "unix" }
]
image = [
    { run = 'qimgv "$@"', orphan = true, for = "unix" }
]


[open]
prepend_rules = [
    { mime = "image/*", use = "image" }
]
